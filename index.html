<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>MEGAFITKO | Termínál</title>
    
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap');
        
        :root { overflow: hidden; }

        body { 
            background: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif;
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none; 
            display: flex;
            flex-direction: column;
        }

        .gym-font { font-family: 'Orbitron', sans-serif; }

        .glass { 
            background: rgba(20, 20, 20, 0.9); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .container-box { transform: scale(0.9); }

        /* Styl pro tlačítka nákupu */
        .buy-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .buy-option:active {
            background: #ef4444;
            transform: scale(0.95);
        }

        input { appearance: none; font-size: 16px !important; }
    </style>
</head>
<body>

    <header class="p-4 text-center">
        <span class="gym-font font-black tracking-widest text-lg uppercase italic text-red-500">Mega<span class="text-white">Fitko</span></span>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">
        
        <div id="login-screen" class="glass p-6 rounded-2xl w-full max-w-[300px] container-box">
            <h1 class="gym-font text-lg font-black mb-1 text-center uppercase tracking-tighter">Člen</h1>
            <p class="text-slate-500 text-center mb-6 text-[10px] uppercase tracking-widest text-red-500 font-bold italic">Systém aktivní</p>
            
            <input type="password" id="password" pattern="\d*" inputmode="numeric" placeholder="PIN" 
                class="w-full p-3 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-red-500 text-center font-bold tracking-[1em] text-sm">
            
            <button onclick="login()" class="w-full bg-red-600 py-3 rounded-xl font-bold uppercase text-xs tracking-widest shadow-lg shadow-red-900/20 active:scale-95 transition-all">
                Autorizovat
            </button>
            <p id="login-error" class="text-red-500 mt-3 text-center text-[9px] font-bold hidden uppercase">Chyba přístupu</p>
        </div>

        <div id="app-screen" class="glass p-6 rounded-2xl w-full max-w-[300px] text-center container-box hidden">
            <div id="selection-zone">
                <h2 class="gym-font text-base font-black uppercase text-red-500 mb-4 italic">Zvolit tarif</h2>
                
                <div class="grid gap-2 mb-4">
                    <button onclick="generateTicket('1 HODINA')" class="buy-option w-full p-3 rounded-xl text-left flex justify-between items-center group">
                        <span class="text-xs font-bold uppercase">1 Hodina</span>
                        <span class="text-[10px] text-red-500 font-black gym-font">VYBRAT</span>
                    </button>
                    
                    <button onclick="generateTicket('1 DEN')" class="buy-option w-full p-3 rounded-xl text-left flex justify-between items-center">
                        <span class="text-xs font-bold uppercase">Celý den</span>
                        <span class="text-[10px] text-red-500 font-black gym-font">VYBRAT</span>
                    </button>

                    <button onclick="generateTicket('1 MĚSÍC')" class="buy-option w-full p-3 rounded-xl text-left flex justify-between items-center">
                        <span class="text-xs font-bold uppercase">Měsíční Pass</span>
                        <span class="text-[10px] text-red-500 font-black gym-font">VYBRAT</span>
                    </button>

                    <button onclick="generateTicket('1 ROK')" class="buy-option w-full p-3 rounded-xl text-left flex justify-between items-center border-red-500/50">
                        <span class="text-xs font-bold uppercase">Roční VIP</span>
                        <span class="text-[10px] text-red-500 font-black gym-font italic underline">BEST</span>
                    </button>
                </div>
            </div>

            <div id="qr-container" class="hidden animate-in fade-in duration-300">
                <h2 id="active-plan" class="text-red-500 font-black text-[10px] mb-4 uppercase tracking-[0.2em] gym-font"></h2>
                <div class="p-3 bg-white rounded-xl inline-block mb-4">
                    <div id="qrcode"></div>
                </div>
                <p class="text-white font-bold text-[9px] mb-6 uppercase opacity-50">Kód je platný pro vstup</p>
                <button onclick="resetSelection()" class="w-full border border-white/10 py-2 rounded-lg text-[9px] font-bold uppercase text-slate-400">Zpět k tarifům</button>
            </div>
            
            <button onclick="logout()" class="mt-6 text-slate-600 text-[9px] font-bold uppercase tracking-widest">Odhlásit</button>
        </div>
    </main>

    <footer class="p-4 text-center text-[8px] text-slate-700 font-bold uppercase tracking-[0.4em] gym-font">
        Terminal Locked | Secure Layer
    </footer>

    <script>
        function login() {
            const pass = document.getElementById('password').value;
            if(pass === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }

        function resetSelection() {
            document.getElementById('selection-zone').classList.remove('hidden');
            document.getElementById('qr-container').classList.add('hidden');
        }

        function generateTicket(plan) {
            // Skryje výběr a zobrazí QR
            document.getElementById('selection-zone').classList.add('hidden');
            const container = document.getElementById('qr-container');
            const qrDiv = document.getElementById('qrcode');
            const planText = document.getElementById('active-plan');
            
            qrDiv.innerHTML = "";
            planText.innerText = "AKTIVNÍ: " + plan;
            container.classList.remove('hidden');
            
            new QRCode(qrDiv, {
                text: "MF-" + plan.replace(" ", "-") + "-" + Date.now(),
                width: 140,
                height: 140,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });

            if (navigator.vibrate) navigator.vibrate(100);
        }
    </script>
</body>
</html>
